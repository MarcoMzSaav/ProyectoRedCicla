<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - RedCicla</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">Oficina RedCicla - Talca</span>
  </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Gestión de Flota</h5>
                    <p class="card-text">Registrar nuevos camiones y programar mantenciones (HU-03).</p>
                    <a href="#" class="btn btn-primary">Ver Camiones</a>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <h3>Rutas Activas de Hoy</h3>
            <table class="table table-striped mt-3 bg-white">
              <thead>
                <tr>
                  <th>Zona</th>
                  <th>Conductor</th>
                  <th>Patente Camión</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Ruta Curicó Norte</td>
                  <td>Juan Pérez</td>
                  <td>AB-CD-12</td>
                  <td><span class="badge bg-warning text-dark">En Ruta</span></td>
                </tr>
                <tr>
                  <td>Ruta Talca Centro</td>
                  <td>María Soto</td>
                  <td>EF-GH-34</td>
                  <td><span class="badge bg-success">Completada</span></td>
                </tr>
              </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
