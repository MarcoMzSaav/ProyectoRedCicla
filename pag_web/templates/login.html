<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso - RedCicla</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-lg p-4">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='images/LOGO_TEXTO_BESIDE.png') }}"  alt="Logo" style="height: 70px;">
                        <h5 class="mt-3 text-secondary">Acceso Restringido</h5>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger py-2 text-center small">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Correo Electrónico</label>
                            <input type="email" name="correo" class="form-control" required placeholder="ejemplo@redcicla.cl">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Contraseña</label>
                            <input type="password" name="clave" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Ingresar al Sistema</button>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>

</body>
</html>
