<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - RedCicla</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f4f7f6; /* Un gris/verde muy suave de fondo */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
        }
        .logo-placeholder {
            font-size: 4rem;
            color: #198754; /* Verde Bootstrap */
        }
    </style>
</head>
<body>

    <div class="card border-0 shadow-lg login-card p-4">
        <div class="card-body text-center">
            
            <div class="mb-4">
                <img src="{{ url_for('static', filename='images/LOGO_TEXTO_BELOW.png') }}" alt="Logo RedCicla" width="150"> 
                <h3 class="text-muted small">Panel de Administración de Flota<h3/>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 small fw-bold" role="alert">
                <i class="bi bi-exclamation-octagon-fill"></i> {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="text-start">
                
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                        <input type="email" name="correo" class="form-control" required placeholder="ejemplo@redcicla.cl">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary small">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                        <input type="password" id="clave" name="clave" class="form-control" required placeholder="••••••••">
                        <button class="btn btn-outline-secondary" type="button" id="btn-ojito" title="Mostrar/Ocultar contraseña">
                            <i class="bi bi-eye" id="icono-ojito"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                    Ingresar al Sistema <i class="bi bi-box-arrow-in-right"></i>
                </button>
            </form>
            
        </div>
    </div>

    <script>
        const btnOjito = document.getElementById('btn-ojito');
        const inputClave = document.getElementById('clave');
        const iconoOjito = document.getElementById('icono-ojito');

        btnOjito.addEventListener('click', function () {
            // Verifica si el tipo actual es 'password' y lo cambia a 'text' o viceversa
            const esPassword = inputClave.getAttribute('type') === 'password';
            inputClave.setAttribute('type', esPassword ? 'text' : 'password');
            
            // Cambia el icono de ojo abierto a ojo tachado
            iconoOjito.classList.toggle('bi-eye');
            iconoOjito.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
