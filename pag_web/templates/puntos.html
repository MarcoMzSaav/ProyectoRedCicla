{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-geo-alt-fill text-success"></i> Gestión de Puntos de Reciclaje</h3>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalNuevoPunto">
        <i class="bi bi-plus-circle"></i> Registrar Nuevo
    </button>
</div>

<div class="row mb-4">
    <div class="col-12"><div id="mapa" style="height: 400px; width: 100%; border-radius: 10px;"></div></div>
</div>

<div class="card border-0 shadow-sm">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Dirección</th>
                    <th>Coordenadas</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for p in puntos %}
                <tr>
                    <td class="fw-bold text-secondary">#{{ p[0] }}</td>
                    <td>{{ p[1] }}</td>
                    <td class="small text-muted">{{ p[2] }}, {{ p[3] }}</td>
                    <td>
                        {% if p[4] == 1 %} <span class="badge bg-success">Activo</span>
                        {% else %} <span class="badge bg-danger">Inactivo</span> {% endif %}
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="centrarMapa({{ p[2] }}, {{ p[3] }})"><i class="bi bi-crosshair"></i></button>
                        
                        <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal" data-bs-target="#modalEditarPunto{{ p[0] }}"><i class="bi bi-pencil"></i></button>
                        
                        <form action="/puntos/estado/{{ p[0] }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-power"></i>
                            </button>
                        </form>
                    </td>
                </tr>

                <div class="modal fade" id="modalEditarPunto{{ p[0] }}" tabindex="-1">
                  <div class="modal-dialog">
                    <div class="modal-content">
                      <form action="/puntos/editar/{{ p[0] }}" method="POST">
                        <div class="modal-header bg-warning"><h5 class="modal-title">Editar Punto #{{ p[0] }}</h5></div>
                        <div class="modal-body">
                            <input type="text" name="direccion" class="form-control mb-2" value="{{ p[1] }}" required>
                            <input type="number" step="any" name="latitud" class="form-control mb-2" value="{{ p[2] }}" required>
                            <input type="number" step="any" name="longitud" class="form-control mb-2" value="{{ p[3] }}" required>
                        </div>
                        <div class="modal-footer"><button type="submit" class="btn btn-warning">Guardar Cambios</button></div>
                      </form>
                    </div>
                  </div>
                </div>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('mapa').setView([-35.4264, -71.6554], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    var puntosJS = {{ puntos|tojson }};
    puntosJS.forEach(function(p) {
        if(p[2] && p[3]) {
            L.marker([p[2], p[3]]).addTo(map).bindPopup(`<b>Punto #${p[0]}</b><br>${p[1]}`);
        }
    });
    function centrarMapa(lat, lng) { map.flyTo([lat, lng], 16, { duration: 1.5 }); window.scrollTo({ top: 0, behavior: 'smooth' }); }
</script>
{% endblock %}
